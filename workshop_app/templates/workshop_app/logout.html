{% extends 'workshop_app/base.html' %}

{% block title %}Logout{% endblock %}

{% block content %}

<style>
.logout-wrapper {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
}

.logout-card {
    width: 100%;
    max-width: 420px;

    padding: 35px;

    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(15px);

    border-radius: 16px;
    border: 1px solid rgba(255, 255, 255, 0.2);

    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);

    animation: fadeUp 0.7s ease;
}

@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.logout-title {
    font-size: 24px;
    font-weight: bold;
    margin-bottom: 10px;
}

.logout-text {
    font-size: 14px;
    color: #cbd5e1;
    margin-bottom: 25px;
}

.btn-login {
    display: inline-block;
    width: 100%;
    padding: 12px;

    border-radius: 8px;
    border: none;

    background: #2563eb;
    color: white;
    font-weight: bold;
    text-decoration: none;

    transition: 0.3s;
}

.btn-login:hover {
    background: #1d4ed8;
    transform: translateY(-2px);
}
</style>

<div class="logout-wrapper">

    <div class="logout-card">

        <div class="logout-title">You have been logged out</div>

        <div class="logout-text">
            Thank you for using the Workshop Portal.
        </div>

        <a href="{% url 'workshop_app:login' %}" class="btn-login">
            Login Again
        </a>

    </div>

</div>

{% endblock %}
