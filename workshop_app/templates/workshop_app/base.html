<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Workshop Portal{% endblock %}</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0a192f, #112240, #1d4ed8);
            overflow-x: hidden;
            color: white;
        }

        /* glow background */
        body::before, body::after {
            content: "";
            position: fixed;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.2;
            z-index: 0;
            animation: float 10s infinite alternate;
        }

        body::before {
            background: #3b82f6;
            top: 10%;
            left: 10%;
        }

        body::after {
            background: #60a5fa;
            bottom: 10%;
            right: 10%;
        }

        @keyframes float {
            from { transform: translateY(0px); }
            to { transform: translateY(-50px); }
        }

        .content {
            position: relative;
            z-index: 2;
        }
    </style>
</head>

<body>

<div class="content">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
